<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0A0A0A"/>

  <!--
    Clean geometric X — two crossing strokes, bold enough at 16px
    Stroke width 2.8, rounded caps, centered at (16,16)
    Extends from corners leaving a small inset margin
  -->
  <line x1="9" y1="9"  x2="23" y2="23" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="23" y1="9" x2="9"  y2="23" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!--
    Subtle aperture ring — 6 short tick marks at 0°/60°/120°/180°/240°/300°
    Radius ~12px from center, each tick is 2px long pointing inward
    This gives the "camera/photography" context without overwhelming the X
  -->
  <circle cx="16" cy="16" r="11.5" stroke="white" stroke-width="0.8" stroke-opacity="0.35"/>
</svg>
