<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    .bg { fill: #0A0A0A; }
    .fg { fill: #FFFFFF; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .fg { fill: #0A0A0A; }
    }
  </style>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" class="bg"/>

  <!--
    Lettermark: RX
    Grid: 32×32, inner area 6–26 (20px wide, 12px half = center 16)
    Left half (R): x 6–15   Right half (X): x 17–26
    Height: y 7–25 (18px)
  -->

  <!-- ═══ R ═══ -->
  <!-- Vertical stem -->
  <rect x="6" y="7" width="2.5" height="18" rx="1" class="fg"/>
  <!-- Top arm -->
  <rect x="6" y="7" width="7" height="2.5" rx="1" class="fg"/>
  <!-- Mid arm -->
  <rect x="6" y="14.75" width="6" height="2.5" rx="1" class="fg"/>
  <!-- Right bowl (vertical connector) -->
  <rect x="11" y="7" width="2" height="10.25" rx="1" class="fg"/>
  <!-- Leg (diagonal from mid-right to bottom-right of R zone) -->
  <line x1="12.5" y1="17.5" x2="15.5" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round" class="fg-stroke"/>

  <!-- ═══ X ═══ -->
  <!-- Left-top to right-bottom -->
  <line x1="17" y1="7" x2="26" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round" class="fg-stroke"/>
  <!-- Right-top to left-bottom -->
  <line x1="26" y1="7" x2="17" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round" class="fg-stroke"/>

  <style>
    .fg-stroke { stroke: #FFFFFF; }
    @media (prefers-color-scheme: dark) {
      .fg-stroke { stroke: #0A0A0A; }
    }
  </style>
</svg>
